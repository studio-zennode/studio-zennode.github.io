<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | Studio Zen-Node</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --accent: #00e5ff;
            --text: #ffffff;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .content { z-index: 2; }

        h1 {
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            color: transparent;
            -webkit-text-stroke: 1px var(--accent);
            position: relative;
        }

        /* 404の数字が揺れる演出 */
        h1::after {
            content: '404';
            position: absolute;
            left: 0; top: 0; width: 100%;
            color: var(--accent);
            opacity: 0.5;
            animation: noise 2s infinite alternate-reverse;
        }

        @keyframes noise {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        p {
            letter-spacing: 0.2em;
            font-size: 1rem;
            color: #888;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }

        /* 背景のノイズ演出 */
        canvas#glitch-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.15;
        }
    </style>
</head>
<body>

    <canvas id="glitch-bg"></canvas>

    <div class="content">
        <h1>404</h1>
        <p>NODE DISCONNECTED / 経路が見つかりません</p>
        <a href="index.html" class="btn">Return to Zen</a>
    </div>

    <script>
        const canvas = document.getElementById('glitch-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawNoise() {
            const idata = ctx.createImageData(canvas.width, canvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) {
                if (Math.random() < 0.05) buffer32[i] = 0xff00e5ff; // アクセントカラーのノイズ
            }
            ctx.putImageData(idata, 0, 0);
            setTimeout(() => requestAnimationFrame(drawNoise), 100);
        }
        drawNoise();
    </script>
</body>
</html>
